# Docker Compose for Production - Laravel Octane/Swoole
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  # ============================================
  # Laravel Application (Octane/Swoole + Queue + Scheduler)
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: clickai-app
    restart: always
    ports:
      - "9000:9000"  # Octane/Swoole
    volumes:
      - app-storage:/var/www/html/storage
      - ./.env:/var/www/html/.env:ro
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      OCTANE_SERVER: swoole
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - clickai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ============================================
  # MySQL Database
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: clickai-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-laravel_backend}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql-prod.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - clickai-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ============================================
  # Redis (Queue & Cache & Session)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: clickai-redis
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - clickai-network
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 128M

  # ============================================
  # Nginx Reverse Proxy
  # ============================================
  nginx:
    image: nginx:1.25-alpine
    container_name: clickai-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx-prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - clickai-network
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  clickai-network:
    driver: bridge

volumes:
  app-storage:
  mysql-data:
  redis-data:
